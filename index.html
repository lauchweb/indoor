<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>indoor.mu</title>
  <meta name="description" content="indoor.mu">

  <style>
    body {
      margin: 0;
      background-color: #f7f7f7;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .header {
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title-block {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      color: #123996;
      margin: 0;
    }

    .subtitle {
      margin: 8px 0 0 0;
      font-size: 16px;
      color: #555;
    }

    .nav {
      display: flex;
      flex-direction: row;
      gap: 30px;
      font-size: 24px;
      font-weight: 400;
      font-family: Arial, sans-serif;
    }

    .help {
      color: #123996;
    }

    .info,
    .about {
      color: #555;
    }

    .spacer {
      flex: 1;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      background: transparent;
    }

    .footer-pc {
      color: #555;
      font-weight: 400;
    }

    .footer-me {
      color: #123996;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .header {
        padding: 20px;
        align-items: center;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .nav {
        font-size: 18px;
        gap: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title-block">
      <h1 class="title">indoor.mu</h1>
      <p class="subtitle">This domain Is for sale</p>
    </div>

    <div class="nav">
      <div class="help">Buy indoor.mu</div>
    
    </div>
  </div>

  <div class="spacer"></div>

  <footer>
    <span class="footer-pc">For Sale ©</span>
    <span class="footer-me">indoor.mu</span>
    <span class="footer-2026">2026</span>
  </footer>

</body>
</html>
